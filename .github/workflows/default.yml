name: Test

on: [push, pull_request]

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgis/postgis:15-3.5
        env:
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: password
      CFLAGS: "-O0"

    steps:
    - uses: actions/checkout@v5

    - name: Install system packages
      run: |
        sudo apt-get update
        sudo apt-get install binutils libproj-dev gdal-bin

    - name: Set up python
      uses: actions/setup-python@v6
      with:
        python-version: 3.13

    - name: Load cached venv
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/.npm
        key: ${{ runner.os }}-pip-node-${{ hashFiles('**/poetry.lock', '**/package-lock.json') }}

    - name: Install dependencies
      env:
        POETRY_VIRTUALENVS_CREATE: "false"
      run: |
        pip install poetry==2.1.3
        poetry install --no-interaction --no-root
        (cd cobrand_hackney && npm install)

    - name: Set up database
      run: |
        createdb noiseworks
        psql -d noiseworks -c 'create extension postgis;'

    - name: Create storage folder
      run: mkdir storage

    - name: Run tests
      env:
        SECRET_KEY: 'secret'
        DATABASE_URL: 'postgis://postgres:password@localhost/noiseworks'
        COBRAND: 'cobrand_hackney'
        FILE_STORAGE_RELATIVE_PATH: 'storage'
        LOG_LEVEL: 'DEBUG'
        LOG_FILE: 'noise.log'
      run: coverage run -m pytest

    - name: Upload code coverage
      continue-on-error: true
      uses: codecov/codecov-action@v5
      with:
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}
